name: Collect GitHub Stats

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest changes
        run: git fetch origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Collect stats
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          REPOS: ${{ vars.REPOS || 'WowCatQwerty/vps-net-stat' }}
          DB_PATH: data/stats.db
        run: python collect_stats.py

      - name: Generate dashboard
        env:
          REPOS: ${{ vars.REPOS || 'WowCatQwerty/vps-net-stat' }}
          DB_PATH: data/stats.db
          OUTPUT_PATH: docs/index.html
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.db docs/index.html
          git commit -m "Update stats [$(date +%Y-%m-%d)]" || true
          git pull origin main --no-rebase || true
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
